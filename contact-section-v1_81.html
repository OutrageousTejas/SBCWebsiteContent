<style>
/* ── Global reset ── */
#contact-section,
#contact-section * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* ── Section shell ──
   JS sets marginLeft + width on mobile for full-bleed.
   Desktop: width:100% fills SQS column naturally — no vw overrides. ── */
#contact-section {
  position: relative;
  background: #ffffff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: clamp(40px, 5vw, 72px) clamp(16px, 4vw, 40px) clamp(40px, 5vw, 72px) !important;
}

/* ── Section heading ── */
.contact-heading {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.8rem, 3vw, 2.6rem);
  color: #7a4a18;
  text-align: center;
  line-height: 1.15;
  margin-bottom: 0.2em !important;
}

.contact-subtitle {
  font-family: 'Pangolin', cursive;
  font-size: clamp(1.2rem, 1.7vw, 1.4rem);
  color: #5c3a14;
  text-align: center;
  margin-bottom: clamp(20px, 3vw, 40px) !important;
}

/* ── Console wrapper: sized to image, positions all children ──
   Desktop image: 1920×2048 → aspect ratio 0.9375 (portrait)
   Mobile  image: 1142×2048 → aspect ratio 0.5576 (tall portrait)
   img {width:100%;height:auto} maintains aspect ratio automatically.
   All overlays positioned as % of rendered image — swap-safe. ── */
.console-wrapper {
  position: relative;
  width: min(72vw, 1300px);
  max-width: calc(100% - 32px);
  overflow: hidden;
}

/* ── Console images ── */
.console-img {
  display: block;
  width: 100%;
  height: auto;
  user-select: none;
  -webkit-user-drag: none;
  /* pointer-events:none so clicks fall through to overlaid form/buttons */
  pointer-events: none;
}

.console-img--desktop { display: block; transform: scale(0.88); transform-origin: center center; }
.console-img--mobile  { display: none; position: relative; /* enables stacking: antenna (earlier in DOM) paints behind this */ }

/* ── Form: transparent layer covering entire wrapper ── */
.console-form {
  position: absolute !important;
  top: 0 !important;
  left: 0 !important;
  width: 100% !important;
  height: 100% !important;
  /* form itself is transparent; children re-enable pointer events */
  pointer-events: none;
}

/* ── Screen-reader-only labels (accessibility) ── */
.sr-only {
  position: absolute !important;
  width: 1px !important;
  height: 1px !important;
  padding: 0 !important;
  margin: -1px !important;
  overflow: hidden !important;
  clip: rect(0,0,0,0) !important;
  white-space: nowrap !important;
  border: 0 !important;
}

/* ── Inputs: transparent over image troughs ── */
.console-input {
  position: absolute !important;
  pointer-events: all;
  background: transparent !important;
  border: none !important;
  outline: none !important;
  /* Color driven by knob position via CSS variable */
  color: var(--console-ink, #3d1f08) !important;
  font-family: 'Pangolin', cursive !important;
  font-size: clamp(1.2rem, 1.7vw, 1.4rem) !important;
  line-height: 1.3 !important;
  padding-left:  0.4em;
  padding-right: 0.4em;
  padding-top:   0.25em;
  resize: none;
  /* Overflow intentionally not set here.
     Single-line inputs are wrapped in .console-clip (overflow:hidden parent)
     which clips text reliably even when input is focused.
     textarea uses overflow-y:auto declared further below. */
  -webkit-tap-highlight-color: transparent;
  transition: color 0.4s ease;
}

.console-input:focus {
  /* No background, no border — console image stays seamless.
     Blinking cursor is sufficient focus indicator for this UI. */
  background: transparent !important;
  border: none !important;
  outline: none !important;
}

/* ── Clip wrapper: enforces trough boundary for single-line inputs ──
   overflow:hidden on a parent element reliably clips text content even
   in a focused <input> — browsers respect parent clipping regardless of
   their internal text-scroll behavior.
   overflow:hidden on the <input> itself is NOT respected when focused.
   padding-top nudges the content area down — t coordinates were
   measured from the outer trough border; actual ink area starts lower.
   Tune this value if text appears too high or too low. ── */
.console-clip {
  position: absolute !important;
  overflow: hidden !important;
  padding-top: 5px;
  /* Pass pointer events through to the input inside */
  pointer-events: none;
}

/* Input inside clip div: fills it exactly.
   padding-top:0 required — centerInputText() sets line-height=offsetHeight
   for geometric vertical centering; any padding-top shifts text downward.
   overflow+white-space+text-overflow must be on the input itself (not parent)
   for ellipsis to render — parent overflow:hidden clips visually but does
   not produce the ellipsis glyph. */
.console-clip .console-input {
  position: absolute !important;
  top: 0 !important;
  left: 0 !important;
  width: 100% !important;
  height: 100% !important;
  padding-top: 0 !important;
  overflow: hidden !important;
  white-space: nowrap !important;
  text-overflow: ellipsis !important;
}

.console-input::placeholder {
  /* Follows knob ink color — user sees placeholder shift color when knob turns,
     making the knob's purpose self-evident before any text is typed. */
  color: var(--console-placeholder, rgba(100, 60, 20, 0.38)) !important;
  font-style: italic;
}

/* Hide placeholder immediately on focus (not just on first keystroke).
   Returns automatically when field loses focus and is still empty — native behavior. */
.console-input:focus::placeholder {
  color: transparent !important;
}

/* Message textarea: fixed size, scrolls internally ── 
   The console has fixed physical dimensions — 
   this is a feature, not a limitation. */
.console-input--message {
  overflow-y: auto !important;
  padding: 0.35em 0.4em !important;
  line-height: 1.1 !important;
  scrollbar-width: thin;
  scrollbar-color: rgba(120,70,20,0.3) transparent;
}
.console-input--message::-webkit-scrollbar { width: 4px; }
.console-input--message::-webkit-scrollbar-thumb {
  background: rgba(120,70,20,0.3);
  border-radius: 2px;
}

/* ── Submit: invisible overlay on drawn TRANSMIT button ── */
.console-submit {
  position: absolute !important;
  pointer-events: all;
  background: transparent !important;
  border: none !important;
  outline: none !important;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  border-radius: 4px;
  transition: transform 0.1s ease, opacity 0.1s ease;
}
.console-submit:active {
  transform: scale(0.94) !important;
  opacity: 0.65;
}
.console-submit:disabled {
  pointer-events: none;
  cursor: default;
}

/* ── LED overlays: transparent circles that add glow ── */
.console-led {
  position: absolute !important;
  pointer-events: all;
  border-radius: 50%;
  cursor: pointer;
  background: transparent;
  transition: box-shadow 0.3s ease, filter 0.3s ease;
  -webkit-tap-highlight-color: transparent;
}

/* Orange LED — intensified fill + glow */
.console-led--1.lit {
  background: rgba(230, 90, 10, 0.70) !important;
  box-shadow:
    0 0 8px  5px rgba(230, 90, 10, 0.90),
    0 0 18px 8px rgba(230, 90, 10, 0.50) !important;
  filter: brightness(1.35);
}

/* Green LED — matched to orange intensity */
.console-led--2.lit {
  background: rgba(30, 180, 60, 0.45) !important;
  box-shadow:
    0 0 8px  5px rgba(30, 180, 60, 0.65),
    0 0 18px 8px rgba(30, 180, 60, 0.28) !important;
  filter: brightness(1.25);
}

/* Both LEDs go green on successful transmission — filled green glow */
.console-led.success {
  background: rgba(50, 200, 80, 0.50) !important;
  box-shadow:
    0 0 10px 5px rgba(50, 200, 80, 0.90),
    0 0 22px 9px rgba(50, 200, 80, 0.40) !important;
  filter: brightness(1.5);
  transition: box-shadow 0.15s ease, filter 0.15s ease, background 0.15s ease !important;
}

/* ── Knob: rotates on click, drives ink color ──
   Now an <img> cutout (ButtonSquareUp.webp, transparent bg).
   Indicator notch starts at top (0°); each click adds 90°.
   No border-radius — image handles its own circular shape.
   transform-origin defaults to center center — correct pivot. */
.console-knob {
  position: absolute !important;
  pointer-events: all;
  cursor: pointer;
  display: block;
  user-select: none;
  -webkit-user-drag: none;
  /* Spring-y rotation feel */
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  -webkit-tap-highlight-color: transparent;
}

/* Ink color themes — knob cycles through these.
   CSS variable consumed by .console-input color above. */
/* Ink colors: 0=black, 1=blue, 2=green, 3=red — common pen ink order */
#contact-section[data-knob="0"] { --console-ink: #3d1f08; --console-placeholder: rgba(61,31,8,0.34);   } /* black (warm brown) */
#contact-section[data-knob="1"] { --console-ink: #1a5f6e; --console-placeholder: rgba(26,95,110,0.34); } /* blue (teal)        */
#contact-section[data-knob="2"] { --console-ink: #3d5a1a; --console-placeholder: rgba(61,90,26,0.34);  } /* green              */
#contact-section[data-knob="3"] { --console-ink: #6b1a3e; --console-placeholder: rgba(107,26,62,0.34); } /* red (plum)         */

/* ── Knob position indicator dots ──
   Small circles at each knob stop around the perimeter.
   Sized 10×10px; positioned by JS (placeKnobDots). Pointer-events:none —
   clicks pass through to the knob image beneath. ── */
.knob-dot {
  position: absolute !important;
  width: 10px;
  height: 10px;
  border-radius: 50%;        /* circle */
  pointer-events: none;
  opacity: 0.90;
  box-shadow: 0 1px 2px rgba(0,0,0,0.35);
}

/* ── Antenna: wobbles on hover and tap ──
   img cutout — wobble animates real visible pixels.
   transform-origin: 100% 100% — pivots from base (bottom-right of image,
   where antenna meets the console body). ── */
.console-antenna {
  position: absolute !important;
  pointer-events: all;
  cursor: pointer;
  display: block;
  user-select: none;
  -webkit-user-drag: none;
  transform-origin: 100% 100%;
  -webkit-tap-highlight-color: transparent;
}

@keyframes antennaWobble {
  0%   { transform: rotate(0deg);    }
  10%  { transform: rotate(-8deg);   }  /* initial swing — unhurried */
  25%  { transform: rotate(6deg);    }  /* first return + overshoot */
  40%  { transform: rotate(-4deg);   }  /* decay oscillation */
  54%  { transform: rotate(2.5deg);  }
  66%  { transform: rotate(-1.5deg); }
  76%  { transform: rotate(0.8deg);  }
  85%  { transform: rotate(-0.4deg); }
  93%  { transform: rotate(0.15deg); }
  100% { transform: rotate(0deg);    }  /* graceful rest */
}
.console-antenna.wobbling {
  animation: antennaWobble 1.6s ease-out forwards !important;
}

/* ── Success overlay: appears inside message area ── */
.console-success {
  position: absolute !important;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(240, 232, 210, 0.96) !important;
  border-radius: 4px;
  opacity: 0;
  transition: opacity 0.5s ease;
  /* padding set here is safe — it's not inside the global reset scope
     for .about-section, and the reset zero above is for contact-section
     which we override with !important where needed */
  padding: clamp(12px, 2vw, 20px) !important;
  text-align: center;
}
.console-success.visible {
  opacity: 1 !important;
}

.console-success-title {
  font-family: 'Fredoka One', cursive !important;
  font-size: clamp(1.2rem, 1.8vw, 1.5rem) !important;
  color: #2e7d32 !important;
  line-height: 1.1 !important;
  margin-bottom: 0.35em !important;
}

.console-success-sub {
  font-family: 'Pangolin', cursive !important;
  font-size: clamp(1.2rem, 1.7vw, 1.4rem) !important;
  color: #388e3c !important;
  line-height: 1.3 !important;
}

/* ── Scroll hint chevron ── */
#contact-scroll-hint {
  position: fixed;
  bottom: clamp(12px, 2dvh, 20px);
  left: 50%;
  transform: translateX(-50%);
  cursor: pointer;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  background: none;
  transition: opacity 0.5s ease;
  animation: contactBounceChevron 1.5s ease infinite;
}
#contact-scroll-hint svg {
  width: clamp(24px, 3.5vw, 36px);
  height: auto;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.6));
}
#contact-scroll-hint.visible {
  opacity: 1 !important;
  pointer-events: all;
}
@keyframes contactBounceChevron {
  0%, 100% { transform: translateX(-50%) translateY(0);   }
  50%       { transform: translateX(-50%) translateY(5px); }
}

/* ══════════════════════════════════════════════════════════════
   STICKY NOTE — mobile only
   Positioned by JS over LED occlusion zone (upper-right console).
   Tap to fall to lower occlusion zone; tap again to re-stick.
   Requires: Gaegu font loaded in Code Injection Header alongside
   Pangolin + Fredoka One. Add to Header if not already present:
   <link href="https://fonts.googleapis.com/css2?family=Gaegu&display=swap" rel="stylesheet">
══════════════════════════════════════════════════════════════ */
.sticky-note {
  display: none; /* hidden by default; enabled in both mobile + desktop media queries */
  position: absolute !important;
  cursor: pointer;
  pointer-events: all;
  /* Resting tilt. transform-origin:center so rotation is symmetric —
     top-right origin was incompatible with JS-driven fall (caused
     off-screen rotation around a far-away anchor point). */
  transform: rotate(-12deg);
  transform-origin: center center;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  z-index: 10;
}

/* .fallen is a state flag only — JS animates left/top/transform directly.
   pointer-events:all kept so user can tap fallen note to re-stick it. */
.sticky-note.fallen {
  cursor: pointer;
}

/* The cutout image — purely decorative backdrop */
.sticky-note__img {
  display: block;
  width: 100%;
  height: auto;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
}

/* Text overlay: more top padding so phone sits lower */
.sticky-note__text {
  position: absolute !important;
  top: 22% !important;
  left: 7% !important;
  right: 5% !important;
  bottom: 20% !important;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 0.2em;
  /* pointer-events:all so taps anywhere on note text register.
     Individual links stay pointer-events:none until .settled. */
  pointer-events: all;
  transform: rotate(-5deg);
  transform-origin: top left;
  overflow: hidden;
}

/* Pencil-style text lines */
.sticky-note__line {
  font-family: 'Gaegu', cursive !important;
  font-size: clamp(1.0rem, 4.4vw, 1.2rem) !important;
  line-height: 1.2 !important;

  /* ── Place a single overlay element ── */
  function place(el, coord, offL, offT, iW, iH) {
    if (!el || !coord) return;
    el.style.left   = (offL + coord.l * iW) + 'px';
    el.style.top    = (offT + coord.t * iH) + 'px';
    el.style.width  = (coord.w * iW) + 'px';
    el.style.height = (coord.h !== null)
      ? (coord.h * iH) + 'px'
      : (coord.w * iW) + 'px'; /* circular: height = width */
  }

  /* ── Vertically center text in a single-line input ──
     Sets line-height = input's own rendered height.
     A single-line input with line-height equal to its height has
     its text geometrically centered — no padding guessing needed.
     Scales perfectly at every viewport size. ── */
  function centerInputText(input) {
    if (!input) return;
    var h = input.offsetHeight;
    if (h > 0) input.style.lineHeight = h + 'px';
  }

  /* ── Place knob indicator squares around knob perimeter ──
     Positioned at -45°, 0°, 45°, 90° from 12 o'clock.
     Math: for angle θ from 12 o'clock (clockwise positive):
       x_offset = sin(θ) * radius
       y_offset = -cos(θ) * radius
     Dots placed just outside knob edge (kr + 14px gap). ── */
  /* Dot colors match ink order: black(0), blue(1), green(2), red(3)
     Darkened ~15% vs ink values for visibility on wood texture. */
  var KNOB_DOT_COLORS = ['#341a06', '#165e6e', '#304d16', '#561630'];
  /* KNOB_DOT_ANGLES computed inside placeKnobDots() — see below.
     Must be computed at call time, after KNOB_COLOR_STOPS/KNOB_STEP_DEG/
     KNOB_START_DEG are defined (those vars are declared later in the script;
     computing here via IIFE caused NaN due to var hoisting with undefined values). */
  var KNOB_DOT_SIZE   = 6;  /* px — small circles */
  var KNOB_DOT_GAP      = 12; /* px outside knob radius */
  /* Horizontal offset to compensate if knob circle is off-center in its PNG.
     Positive = shift dots right, negative = shift dots left. Tune visually. */
  var KNOB_DOT_CX_ADJUST = -3; /* px — tested value: shifts dots to visual knob center */

  function placeKnobDots(knobCoord, offL, offT, iW, iH) {
    /* Angles computed here at call time — KNOB_COLOR_STOPS, KNOB_STEP_DEG,
       KNOB_START_DEG are declared later in the script. Computing in an IIFE
       at declaration time caused NaN due to var hoisting (undefined values). */
    var dotAngles = [];
    for (var di = 0; di < KNOB_COLOR_STOPS; di++) {
      dotAngles.push(KNOB_START_DEG + di * KNOB_STEP_DEG);
    }

    /* cx: l is fraction of iW — correct */
    var cx   = offL + (knobCoord.l + knobCoord.w / 2) * iW + KNOB_DOT_CX_ADJUST;
    /* cy: knob height = w*iW px (circular: h:null), not t-fraction of iH */
    var cy   = offT + knobCoord.t * iH + (knobCoord.w * iW) / 2;
    var kr   = (knobCoord.w * iW) / 2;
    var orb  = kr + KNOB_DOT_GAP;
    var half = KNOB_DOT_SIZE / 2;

    dotAngles.forEach(function(deg, i) {
      var dot = knobDots[i];
      if (!dot) return;
      var rad = deg * Math.PI / 180;
      dot.style.position   = 'absolute';
      dot.style.left       = (cx + Math.sin(rad) * orb - half) + 'px';
      dot.style.top        = (cy - Math.cos(rad) * orb - half) + 'px';
      dot.style.background = KNOB_DOT_COLORS[i];
    });
  }

  /* ── Position all overlays relative to wrapper ── */
  function placeOverlays() {
    var img = activeImg();
    if (!img || !wrapper) return;

    var r   = img.getBoundingClientRect();
    var wR  = wrapper.getBoundingClientRect();
    var C   = activeCoords();
    var offL = r.left - wR.left;
    var offT = r.top  - wR.top;
    var iW   = r.width;
    var iH   = r.height;

    /* Place clip wrappers (not inputs directly) for single-line fields.
       The input inside each clip div fills it via CSS (width/height:100%).
       centerInputText() then sets line-height = height for vertical centering. */
    place(clipName,  C.name,    offL, offT, iW, iH);
    place(clipEmail, C.email,   offL, offT, iW, iH);
    place(clipPhone, C.phone,   offL, offT, iW, iH);

    centerInputText(inputName);
    centerInputText(inputEmail);
    centerInputText(inputPhone);

    place(inputMsg,   C.message, offL, offT, iW, iH);
    place(submitBtn,  C.submit,  offL, offT, iW, iH);

    /* Vertical centering handled by correct t coordinates — no JS needed. */
    place(led1,       C.led1,    offL, offT, iW, iH);
    place(led2,       C.led2,    offL, offT, iW, iH);
    place(knobEl,     C.knob,    offL, offT, iW, iH);
    placeKnobDots(C.knob, offL, offT, iW, iH);
    place(antennaEl,  C.antenna, offL, offT, iW, iH);

    /* Success overlay sits exactly over message area */
    place(successBox, C.message, offL, offT, iW, iH);

    /* ── Sticky note placement ────────────────────────────────────
       MOBILE: peeks off right viewport edge (~83% visible), falls
         to lower-left of console image (OcclusionZoneB).
       DESKTOP: fully visible, pinned upper-right corner of console
         wrapper, falls LEFT of console into the stump area.
         Falls on field focus (not tap) — no re-pin needed.

       Both paths store _fallCX/_fallCY/_restL/_restT on the element
       so the shared animateFall() function works for both. ── */
    if (stickyNote) {
      var noteW = STICKY.w * iW;
      var noteH = noteW * (284 / 278);

      if (isMobile()) {
        /* ── Mobile: peek off right viewport edge ── */
        if (!stickyNote.classList.contains('fallen')) {
          var vpRight = window.innerWidth - wR.left;
          var noteL   = vpRight - noteW * 0.83;
          var noteT   = offT + STICKY.anchorT * iH;
          stickyNote.style.left      = noteL + 'px';
          stickyNote.style.top       = noteT + 'px';
          stickyNote.style.width     = noteW + 'px';
          stickyNote.style.height    = noteH + 'px';
          stickyNote.style.transform = 'rotate(-12deg)';
        }
        /* Fall target: OcclusionZoneB lower-left of console image */
        var rawFCX = offL + STICKY.fallCX * iW;
        var rawFCY = offT + STICKY.fallCY * iH;
        stickyNote._fallCX = Math.max(offL + noteW/2, Math.min(rawFCX, offL + iW - noteW/2));
        stickyNote._fallCY = Math.max(offT + noteH/2, Math.min(rawFCY, offT + iH - noteH/2));
        stickyNote._fallRot = -8;   /* mobile: lands nearly flat */

      } else {
        /* ── Desktop: fully visible, upper-right of console wrapper ──
           Position relative to wrapper (offL/offT = 0 since wrapper is
           the positioning context for all overlays). Note sits at top-right
           of the console, tilted -12deg, fully in frame. */

        /* Note sized at 15% of stage width — confirmed readable at 1300px stage. */
        var stageEl   = document.getElementById('contactStage');
        var stageR    = stageEl ? stageEl.getBoundingClientRect() : wR;
        var stageW    = stageR.width;
        var deskNoteW = stageW * 0.145;
        var deskNoteH = deskNoteW * (284/278);
        noteW = deskNoteW;
        noteH = deskNoteH;

        if (!stickyNote.classList.contains('fallen')) {
          /* Rest position: v1.75 base + 15px right + 5px down per v1.75 test */
          var noteL = iW * 0.655;
          var noteT = offT + iH * 0.069;
          stickyNote.style.left      = noteL + 'px';
          stickyNote.style.top       = noteT + 'px';
          stickyNote.style.width     = deskNoteW + 'px';
          stickyNote.style.height    = deskNoteH + 'px';
          stickyNote.style.transform = 'rotate(-12deg)';
        }

        /* Fall: v1.75 base + 30px up + 10px right */
        stickyNote._fallCX  = offL - deskNoteW * 0.34;
        stickyNote._fallCY  = offT + iH * 0.839;
        stickyNote._fallRot = -15;
        stickyNote._noteW   = deskNoteW;
        stickyNote._noteH   = deskNoteH;
      }

      /* Common: store rest position and dimensions */
      stickyNote._noteW  = noteW;
      stickyNote._noteH  = noteH;
      if (!stickyNote.classList.contains('fallen')) {
        stickyNote._restL = parseFloat(stickyNote.style.left)  || 0;
        stickyNote._restT = parseFloat(stickyNote.style.top)   || 0;
      }
    }

    /* ── Debug mode: show red dot at top-left of each element ──
       Set DEBUG_COORDS = true at top of script to activate. ── */
    if (DEBUG_COORDS) {
      ['debug-d1','debug-d2','debug-d3','debug-d4','debug-d5','debug-d6','debug-d7','debug-d8','debug-d9'].forEach(function(id){
        var old = document.getElementById(id);
        if (old) old.parentNode.removeChild(old);
      });
      var fields = [
        { id:'debug-d1', coord:C.name    },
        { id:'debug-d2', coord:C.email   },
        { id:'debug-d3', coord:C.phone   },
        { id:'debug-d4', coord:C.message },
        { id:'debug-d5', coord:C.submit  },
        /* Antenna: render dot at bottom-right (base) not top-left (tip) */
        { id:'debug-d6', coord:C.antenna, anchorBR: true },
        { id:'debug-d7', coord:C.led1    },
        { id:'debug-d8', coord:C.led2    },
        { id:'debug-d9', coord:C.knob, anchorCenter: true }
      ];
      fields.forEach(function(f) {
        var dot = document.createElement('div');
        dot.id = f.id;
        /* anchorBR: render at bottom-right of element (e.g. antenna base) */
        /* anchorCenter: for circular elements, dot at visual center */
        var dotX = f.anchorCenter
          ? offL + (f.coord.l + f.coord.w / 2) * iW - 4
          : f.anchorBR
            ? offL + (f.coord.l + f.coord.w) * iW - 4
            : offL + f.coord.l * iW - 4;
        var dotY = f.anchorCenter
          ? offT + f.coord.t * iH + (f.coord.w * iW) / 2 - 4
          : f.anchorBR
            ? offT + (f.coord.t + f.coord.h) * iH - 4
            : offT + f.coord.t * iH - 4;
        dot.style.cssText = [
          'position:absolute',
          'width:8px','height:8px',
          'background:red','border-radius:50%',
          'pointer-events:none','z-index:9999',
          'left:' + dotX + 'px',
          'top:'  + dotY + 'px'
        ].join(';');
        wrapper.appendChild(dot);
      });
    }
  }

  /* ── Full-bleed + stage sizing ──
     Section always escapes SQS column via JS (required — CSS width resolves
     to narrow code block column). Section bg is white so full-width is invisible.
     On desktop: .contact-stage is sized to match Mainroom image geometry,
     same pattern as About's .about-paper. Stump bg lives on stage, not section. ── */
  function fixFullBleed() {
    if (!section) return;
    /* Reset so measurement reflects natural document position */
    section.style.marginLeft = '';
    section.style.width = '';
    void section.offsetWidth;
    var rect    = section.getBoundingClientRect();
    var scrollX = window.pageXOffset || document.documentElement.scrollLeft;
    /* Stretch section to full viewport width */
    section.style.marginLeft = (-rect.left - scrollX) + 'px';
    section.style.width = window.innerWidth + 'px';

    /* Desktop: size stage to match Mainroom image width + centering */
    if (stage && !isMobile()) {
      var vw = window.innerWidth;
      /* Standard content width: min(1300px, vw - 120px).
         Independent of any other section — self-contained centering.
         1300px cap: wide enough for rich illustrated content, confirmed
         by measuring About section at ~1266px which looks correct.
         Leaves ≥60px breathing room each side at any viewport width. */
      var stageW = Math.min(1300, vw - 120);
      stage.style.width      = stageW + 'px';
      stage.style.marginLeft = Math.floor((vw - stageW) / 2) + 'px';
      if (DEBUG_STAGE) {
        console.log('[SBC DEBUG_STAGE] stage set to width=' + stageW +
          ' marginLeft=' + Math.floor((vw - stageW) / 2) +
          ' vw=' + vw + ' formula=min(1300,vw-120)');
        var sectionR = section.getBoundingClientRect();
        console.log('[SBC DEBUG_STAGE] section BCR left=' +
          Math.round(sectionR.left) + ' width=' + Math.round(sectionR.width));
        var stageR2 = stage.getBoundingClientRect();
        console.log('[SBC DEBUG_STAGE] stage BCR left=' +
          Math.round(stageR2.left) + ' width=' + Math.round(stageR2.width));
      }
    } else if (stage) {
      stage.style.width      = '';
      stage.style.marginLeft = '';
    }
  }

  /* ── Mobile full-width wrapper ──
     CSS align-self:stretch can be overridden by SQS injected styles.
     After fixFullBleed() sets section to innerWidth, explicitly set
     wrapper width to match — section.offsetWidth is already innerWidth
     at this point, so this is deterministic and override-proof. ── */
  function fixMobileWidth() {
    if (!wrapper) return;
    if (isMobile()) {
      wrapper.style.width    = section.offsetWidth + 'px';
      wrapper.style.maxWidth = 'none';
    } else {
      wrapper.style.width    = '';
      wrapper.style.maxWidth = '';
    }
    if (DEBUG_WIDTH) {
      wrapper.style.background = 'rgba(255,0,0,0.25)';
    }
  }

  /* ── Fix SQS container height (confirmed working pattern) ── */
  function fixContainerHeight() {
    if (!section) return;
    var h = section.offsetHeight + 'px';
    [
      section.closest('.fluid-engine'),
      section.closest('.sqs-block'),
      section.closest('.fe-block'),
      section.closest('.sqs-block-content'),
      section.closest('.sqs-code-container')
    ].forEach(function(el) {
      if (!el) return;
      el.style.height    = h;
      el.style.minHeight = h;
      el.style.maxHeight = h;
    });
  }

  /* ── Console width: computed from stage height ──
     Console image is portrait (1132×2048, ratio 0.5527 w/h).
     Target: console height = 75% of stage height.
     consoleW = stageH * 0.75 * 0.5527
     Clamped 240–400px so it stays readable at any viewport size.
     Must run after stage is sized by fixFullBleed(). ── */
  function setConsoleWidth() {
    if (!wrapper || isMobile()) return;
    var stageEl = document.getElementById('contactStage');
    if (!stageEl) return;
    var stageH = stageEl.getBoundingClientRect().height;
    if (DEBUG_STAGE) console.log('[SBC DEBUG_STAGE] setConsoleWidth: stageH=' + Math.round(stageH));
    if (stageH === 0) {
      if (DEBUG_STAGE) console.warn('[SBC DEBUG_STAGE] stageH=0, skipping — will retry via rAF');
      return;
    }
    var MOB_IMG_RATIO = 1132 / 2048;
    var targetH  = stageH * 0.95;  /* 95% of stage height → ~401px wide at 765px stage */
    var consoleW = Math.round(targetH * MOB_IMG_RATIO);
    consoleW = Math.max(260, Math.min(consoleW, 420));
    if (DEBUG_STAGE) console.log('[SBC DEBUG_STAGE] setConsoleWidth: consoleW=' + consoleW);
    wrapper.style.width = consoleW + 'px';
    var fontSize = Math.max(13, Math.round(consoleW * 0.052));
    var fontVal  = fontSize + 'px';
    [inputName, inputEmail, inputPhone, inputMsg].forEach(function(inp) {
      if (inp) inp.style.fontSize = fontVal;
    });
  }

  /* ── Init ── */
  function init() {
    fixFullBleed();
    fixMobileWidth();
    /* Defer overlay placement by one rAF so the browser resolves
       aspect-ratio geometry on the stage before we measure it.
       fixFullBleed sets stage.style.width (inline), but the browser
       needs a layout pass to compute stage.offsetHeight from aspect-ratio. */
    requestAnimationFrame(function() {
      setConsoleWidth();
      placeOverlays();
      fixContainerHeight();
      if (DEBUG_STAGE) {
        var stageEl2 = document.getElementById('contactStage');
        if (stageEl2) {
          var r2 = stageEl2.getBoundingClientRect();
          console.log('[SBC DEBUG_STAGE] post-rAF stage BCR: w=' +
            Math.round(r2.width) + ' h=' + Math.round(r2.height));
          console.log('[SBC DEBUG_STAGE] wrapper BCR w=' +
            Math.round(wrapper ? wrapper.getBoundingClientRect().width : -1));
        }
      }
    });
  }

  /* Both breakpoints now use the mobile image (transparent bg).
     Only gate on mobReady — deskReady/imgDesk no longer needed. */
  var mobReady  = false;

  function tryInit() {
    if (mobReady) init();
  }

  if (imgMob) {
    if (imgMob.complete) { mobReady = true; }
    else imgMob.addEventListener('load', function() { mobReady = true; tryInit(); });
  }

  tryInit();
  window.addEventListener('load',   init);
  window.addEventListener('resize', init);

  /* ══════════════════════════════════════════════════════════════
     INTERACTIVE ELEMENTS
  ══════════════════════════════════════════════════════════════ */

  /* ── Reusable tap handler (scroll-vs-tap: delta < 12px) ── */
  function addTap(el, fn) {
    if (!el) return;
    var _x = 0, _y = 0;
    el.addEventListener('pointerdown', function(e) { _x = e.clientX; _y = e.clientY; });
    el.addEventListener('pointerup',   function(e) {
      if (Math.abs(e.clientX - _x) < 12 && Math.abs(e.clientY - _y) < 12) fn(e);
    });
    el.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fn(e); }
    });
  }

  /* ── LEDs: tap to toggle glow ── */
  addTap(led1, function() { led1.classList.toggle('lit'); });
  addTap(led2, function() { led2.classList.toggle('lit'); });

  /* ── Sticky note: wider tap threshold + full-surface hit area ──
     Standard addTap uses 12px movement threshold — too tight when users
     press-and-drag trying to "read" or "copy" text on the note.
     25px tolerates small selection gestures while still distinguishing
     intentional page scrolling. pointer-events:all on .sticky-note__text
     ensures the whole note surface is tappable, not just the image behind it. */
  if (stickyNote) {
    var stickyAnimFrame = null;
    var _sx = 0, _sy = 0;

    function animateFall(fromL, fromT) {
      if (stickyAnimFrame) cancelAnimationFrame(stickyAnimFrame);
      var noteW    = stickyNote._noteW || (STICKY.w * 300);
      var noteH    = stickyNote._noteH || (noteW * 284/278);
      var toL      = (stickyNote._fallCX || 100) - noteW/2;
      var toT      = (stickyNote._fallCY || 400) - noteH/2;
      /* End rotation: mobile lands flat (~-8deg), desktop leans nearly vertical
         (~-78deg) as if propped against the console base. Stored by placeOverlays. */
      var fromRot  = -12;
      var toRot    = (stickyNote._fallRot !== undefined) ? stickyNote._fallRot : -8;
      var duration = 5000;
      var startTs  = null;
      function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
      function frame(ts) {
        if (!startTs) startTs = ts;
        var t  = Math.min((ts - startTs) / duration, 1);
        var te = easeOut(t);
        var zigzag = Math.sin(t * Math.PI * 2.5) * 35 * (1 - t);
        stickyNote.style.left      = (fromL + (toL - fromL) * te + zigzag) + 'px';
        stickyNote.style.top       = (fromT + (toT - fromT) * te) + 'px';
        stickyNote.style.transform = 'rotate(' + (fromRot + (toRot - fromRot) * te) + 'deg)';
        if (t < 1) stickyAnimFrame = requestAnimationFrame(frame);
        else {
          stickyAnimFrame = null;
          stickyNote.classList.add('settled');
        }
      }
      stickyAnimFrame = requestAnimationFrame(frame);
    }

    function handleStickyTap(e) {
      /* Let link taps fire normally when settled */
      if (e && e.target && e.target.closest && e.target.closest('a') &&
          stickyNote.classList.contains('settled')) return;
      /* Re-stick on both mobile and desktop — user can re-pin to replay animation,
         especially useful on desktop where auto-drop may have fired unexpectedly. */
      if (stickyNote.classList.contains('fallen')) {
        if (stickyAnimFrame) { cancelAnimationFrame(stickyAnimFrame); stickyAnimFrame = null; }
        stickyNote.classList.remove('fallen');
        stickyNote.classList.remove('settled');
        stickyNote.style.left      = (stickyNote._restL || 0) + 'px';
        stickyNote.style.top       = (stickyNote._restT || 0) + 'px';
        stickyNote.style.transform = 'rotate(-12deg)';
        /* Desktop: reset auto-drop flag so focus triggers it again */
        desktopDropped = false;
      }
    }

    /* ── Desktop auto-drop: note falls when user focuses any form field ──
       Thematic: you picked up the radio to transmit, the note fell off.
       desktopDropped hoisted here so handleStickyTap can reset it on re-pin. ── */
    var desktopDropped = false;
    if (!isMobile()) {
      function desktopAutoDrop() {
        if (desktopDropped || stickyNote.classList.contains('fallen')) return;
        desktopDropped = true;
        var curL = parseFloat(stickyNote.style.left) || 0;
        var curT = parseFloat(stickyNote.style.top)  || 0;
        stickyNote._restL = curL;
        stickyNote._restT = curT;
        stickyNote.classList.add('fallen');
        animateFall(curL, curT);
      }
      [inputName, inputEmail, inputPhone, inputMsg].forEach(function(inp) {
        if (inp) inp.addEventListener('focus', desktopAutoDrop);
      });
    }

    stickyNote.addEventListener('pointerdown', function(e) {
      _sx = e.clientX; _sy = e.clientY;
      /* Fall triggers immediately on pointerdown when note is at rest.
         pointerup on this same touch is intentionally ignored — we set
         _fallStarted so the pointerup handler knows not to re-stick. */
      if (!stickyNote.classList.contains('fallen')) {
        if (e.target && e.target.closest && e.target.closest('a')) return;
        var curL = parseFloat(stickyNote.style.left) || 0;
        var curT = parseFloat(stickyNote.style.top)  || 0;
        stickyNote._restL = curL;
        stickyNote._restT = curT;
        stickyNote._fallStarted = true; /* flag: ignore the paired pointerup */
        stickyNote.classList.add('fallen');
        animateFall(curL, curT);
      }
    });
    stickyNote.addEventListener('pointerup', function(e) {
      /* Ignore the pointerup that immediately follows the initiating pointerdown.
         Only handle pointerup once the note is settled (links + re-pin active). */
      if (stickyNote._fallStarted) {
        stickyNote._fallStarted = false;
        return;
      }
      if (!stickyNote.classList.contains('fallen')) return;
      var moved = Math.abs(e.clientX - _sx) + Math.abs(e.clientY - _sy);
      if (moved > 25) return;
      handleStickyTap(e);
    });
    stickyNote.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleStickyTap(e); }
    });
  }


  /* ── Knob: tap cycles through 4 ink colors ──
     Starts at -45° (10-11 o'clock, naturally resting position).
     Each click rotates 45° clockwise. After 4 clicks reaches 135° (4-5 o'clock).
     5th click wraps back to -45°. Ink color maps: pos 0-3 → 4 themes, pos 4 = pos 0. */
  /* Formula-based symmetric knob positions:
     KNOB_START_DEG = -(KNOB_STEP_DEG × (KNOB_COLOR_STOPS-1) / 2)
     With 4 stops at 32° each: start=-48°, positions: -48,-16,+16,+48
     Arc = 96° total, centered on 12 o'clock.
     To change: adjust KNOB_STEP_DEG or KNOB_COLOR_STOPS; start auto-recalculates. */
  var KNOB_COLOR_STOPS = 4;
  var KNOB_STEP_DEG    = 32;  /* 32° steps → -48,-16,+16,+48 (96° arc, symmetric) */
  var KNOB_START_DEG   = -(KNOB_STEP_DEG * (KNOB_COLOR_STOPS - 1) / 2); /* = -48 */

  /* Default = position 1 (blue) — knob rests at second stop, looks naturally
     adjusted rather than untouched, and blue is the most legible ink color. */
  var knobPos = 1;

  /* Apply initial resting position immediately — no transition on load */
  knobEl.style.transition = 'none';
  knobEl.style.transform  = 'rotate(' + (KNOB_START_DEG + knobPos * KNOB_STEP_DEG) + 'deg)';
  /* Re-enable spring transition after a frame so first click animates */
  requestAnimationFrame(function() {
    knobEl.style.transition = '';
  });

  section.setAttribute('data-knob', String(knobPos));

  addTap(knobEl, function() {
    knobPos = (knobPos + 1) % KNOB_COLOR_STOPS;
    var deg = KNOB_START_DEG + (knobPos * KNOB_STEP_DEG);
    knobEl.style.transform = 'rotate(' + deg + 'deg)';
    section.setAttribute('data-knob', String(knobPos));
  });

  /* ── Antenna: wobble on hover and tap ── */
  var antBusy = false;

  function wobble() {
    if (!antennaEl || antBusy) return;
    antBusy = true;
    antennaEl.classList.add('wobbling');
    antennaEl.addEventListener('animationend', function h() {
      antennaEl.classList.remove('wobbling');
      antBusy = false;
      antennaEl.removeEventListener('animationend', h);
    });
  }

  if (antennaEl) {
    antennaEl.addEventListener('pointerenter', wobble);
    addTap(antennaEl, wobble);

    /* Auto-wobble when Contact section scrolls into view —
       same pattern as About Me fidget spinner (threshold:0.6,
       fires once on first intersection, 300ms delay). */
    if ('IntersectionObserver' in window) {
      /* No disconnect() — fires each time section enters viewport.
         Physical metaphor: page motion causes wobbly antenna to wobble,
         same logic as fidget spinner spinning on page motion. Feels alive
         rather than glitchy because the animation has a plausible cause. */
      var antObs = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) {
          if (e.isIntersecting) setTimeout(wobble, 300);
        });
      }, { threshold: 0.6 });
      antObs.observe(section);
    }
  }

  /* ══════════════════════════════════════════════════════════════
     FORM SUBMISSION (progressive enhancement via fetch)
     Falls back gracefully if JS fails — native POST to Formspree
     still works without the delight animations.
  ══════════════════════════════════════════════════════════════ */
  if (form) {
    form.addEventListener('submit', function(e) {
      e.preventDefault();

      /* ── Client-side validation before fetch ──
         Runs after e.preventDefault() so we control the error display.
         Email regex matches standard format: x@x.xx
         Phone: optional — only validates if something was entered. */
      var emailVal = inputEmail ? inputEmail.value.trim() : '';
      var emailOk  = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(emailVal);
      if (!emailOk) {
        if (inputEmail) {
          inputEmail.focus();
          inputEmail.style.borderBottom = '2px solid rgba(180,30,30,0.8) !important';
          setTimeout(function() {
            inputEmail.style.borderBottom = '';
          }, 2500);
        }
        alert('Please enter a valid email address (e.g. name@domain.com)');
        return;
      }

      var data = new FormData(form);

      fetch(form.action, {
        method:  'POST',
        body:    data,
        headers: { 'Accept': 'application/json' }
      })
      .then(function(res) {
        if (res.ok) {
          /* ── ✅ Success delight sequence ── */

          /* 1. Show success message in console screen */
          if (successBox) successBox.classList.add('visible');

          /* 2. Both LEDs go green */
          [led1, led2].forEach(function(led) {
            if (!led) return;
            led.classList.remove('lit');       /* clear existing state */
            void led.offsetWidth;              /* reflow */
            led.classList.add('success');
          });

          /* 3. Antenna celebrates — double wobble */
          wobble();
          setTimeout(wobble, 850);

          /* 4. Disable submit to prevent double-send */
          if (submitBtn) submitBtn.disabled = true;

        } else {
          /* ── ❌ Formspree returned an error ── */
          res.json().then(function(data) {
            var msg = (data && data.errors)
              ? data.errors.map(function(err) { return err.message; }).join('\n')
              : 'Something went wrong — please try again.';
            alert(msg);
          }).catch(function() {
            alert('Something went wrong — please try again.');
          });
        }
      })
      .catch(function() {
        /* Network error — form still submitted natively if user retries */
        alert('Network error — check your connection and try again.');
      });
    });
  }

  /* ══════════════════════════════════════════════════════════════
     CHEVRON
  ══════════════════════════════════════════════════════════════ */
  var chevron = document.getElementById('contact-scroll-hint');

  /* Move to body for reliable position:fixed in Fluid Engine */
  if (chevron) document.body.appendChild(chevron);

  function updateChevron() {
    if (!chevron || !section) return;
    var r = section.getBoundingClientRect();
    var inView = r.top < window.innerHeight && r.bottom > window.innerHeight * 0.3;
    chevron.classList.toggle('visible', inView);
  }

  if (chevron) {
    chevron.addEventListener('click', function() {
      if (window.SBC) window.SBC.scrollToNext('contact-section');
      else window.scrollBy({ top: window.innerHeight, behavior: 'smooth' });
    });
  }

  window.addEventListener('scroll', updateChevron, { passive: true });
  window.addEventListener('load',   updateChevron);

  /* ══════════════════════════════════════════════════════════════
     DEBUG PANEL — remove before launch (along with version badge)
     Floating panel with toggle buttons for all debug flags.
     State persists via sessionStorage so it survives page reloads.
     Open browser console to see DEBUG_STAGE output.
  ══════════════════════════════════════════════════════════════ */
  (function buildDebugPanel() {
    var panel = document.createElement('div');
    panel.id  = 'sbc-debug-panel';
    panel.style.cssText = [
      'position:fixed','bottom:8px','left:8px',
      'background:rgba(10,30,50,0.55)',
      'color:#fff',
      'font:bold 11px/1.6 monospace','padding:6px 10px',
      'border-radius:6px','z-index:999999',
      'display:flex','flex-direction:column','gap:3px',
      'box-shadow:0 2px 8px rgba(0,0,0,0.4)',
      'backdrop-filter:blur(2px)',
      'min-width:160px'
    ].join(';');

    var flags = [
      { key:'sbc_debug_coords', label:'DEBUG_COORDS' },
      { key:'sbc_debug_width',  label:'DEBUG_WIDTH'  },
      { key:'sbc_debug_stage',  label:'DEBUG_STAGE'  }
    ];

    flags.forEach(function(f) {
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none';
      var on  = sessionStorage.getItem(f.key) === 'true';
      var dot = document.createElement('span');
      dot.style.cssText = 'display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0;' +
        'background:' + (on ? '#4f4' : '#f66');
      var lbl = document.createElement('span');
      lbl.textContent = f.label + ' ' + (on ? 'ON' : 'OFF');
      row.appendChild(dot); row.appendChild(lbl);
      row.addEventListener('click', function() {
        var cur = sessionStorage.getItem(f.key) === 'true';
        sessionStorage.setItem(f.key, String(!cur));
        location.reload();
      });
      panel.appendChild(row);
    });

    /* Re-run init without reload */
    var reloadBtn = document.createElement('div');
    reloadBtn.textContent = '↺ re-run init';
    reloadBtn.style.cssText = 'margin-top:2px;cursor:pointer;color:#8cf;user-select:none;' +
      'border-top:1px solid rgba(255,255,255,0.15);padding-top:3px';
    reloadBtn.addEventListener('click', function() { init(); });
    panel.appendChild(reloadBtn);

    /* Mouse coordinate display */
    var coordRow = document.createElement('div');
    coordRow.style.cssText = 'border-top:1px solid rgba(255,255,255,0.15);' +
      'padding-top:3px;margin-top:2px;color:#fd8;letter-spacing:0.03em';
    coordRow.textContent = 'x:— y:—';
    panel.appendChild(coordRow);
    document.addEventListener('mousemove', function(e) {
      coordRow.textContent = 'x:' + e.clientX + ' y:' + e.clientY;
    });

    document.body.appendChild(panel);
  })();

})();
</script>
